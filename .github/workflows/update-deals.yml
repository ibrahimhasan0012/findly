name: Findly Deal Updater

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger

jobs:
  update-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Scrape live deals
        run: node scripts/fetch-deals.js

      - name: Commit updated products
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/shopnot-inspired/data/products.json
          git diff --staged --quiet || git commit -m "chore: refresh live deals [skip ci]"
          git pull --rebase
          git push

  deploy:
    needs: update-deals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public/shopnot-inspired'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
