<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Findly — Tech Search for Bangladesh</title>
  <meta name="description" content="Search once, compare prices from BD tech stores.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="top-nav">
    <div class="nav-left">
      <span class="logo">Findly</span>
      <span class="logo-sub">a product of Giggly Gadgets</span>
    </div>
    <button class="dark-toggle" id="dark-toggle" aria-label="Toggle dark mode">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </header>

  <!-- Home state -->
  <section class="home" id="home">
    <h1 class="home-title">Find any tech deal<br>across Bangladesh</h1>
    <p class="home-sub">Search once. Compare prices from 10+ BD stores instantly.</p>

    <div class="search-wrapper home-search">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search phones, laptops, earbuds..." autocomplete="off" spellcheck="false">
    </div>

    <div class="trending">
      <span class="trending-label">Trending</span>
      <div class="trending-chips">
        <button class="t-chip" data-q="Samsung Galaxy S25">Samsung Galaxy S25</button>
        <button class="t-chip" data-q="iPhone 16 Pro">iPhone 16 Pro</button>
        <button class="t-chip" data-q="Sony WH-1000XM5">Sony WH-1000XM5</button>
        <button class="t-chip" data-q="MacBook Air M3">MacBook Air M3</button>
        <button class="t-chip" data-q="RTX 4060">RTX 4060</button>
        <button class="t-chip" data-q="Xiaomi 14T">Xiaomi 14T</button>
        <button class="t-chip" data-q="Apple AirPods Pro">AirPods Pro</button>
        <button class="t-chip" data-q="Gaming Keyboard">Gaming Keyboard</button>
        <button class="t-chip" data-q="Anker Powerbank">Anker Powerbank</button>
        <button class="t-chip" data-q="4K Monitor">4K Monitor</button>
      </div>
    </div>
  </section>

  <!-- Results state -->
  <main class="results-container" id="results-container">

    <div class="results-bar">
      <div class="search-wrapper compact-search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input-results" placeholder="Search again..." autocomplete="off" spellcheck="false">
      </div>
      <button class="filter-btn" id="filter-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
          <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
          <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
          <line x1="17" y1="16" x2="23" y2="16"/>
        </svg>
        Filter
      </button>
    </div>

    <!-- Filter panel -->
    <div id="filter-panel" class="filter-panel">
      <div class="filter-row">
        <div class="filter-group">
          <label>Min price (৳)</label>
          <input type="number" id="filter-min" placeholder="0" min="0">
        </div>
        <div class="filter-group">
          <label>Max price (৳)</label>
          <input type="number" id="filter-max" placeholder="Any" min="0">
        </div>
        <div class="filter-group">
          <label>Sort by</label>
          <select id="filter-sort">
            <option value="default">Relevance</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>
        <div class="filter-group" style="justify-content:flex-end;">
          <button id="filter-clear">Clear</button>
        </div>
      </div>
    </div>

    <p id="result-summary" class="result-summary"></p>
    <div id="product-grid" class="product-grid"></div>

    <div class="pagination" id="pagination"></div>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal" id="product-modal">
    <div class="modal-card">
      <div class="modal-image-wrap">
        <img id="modal-img" src="" alt="">
        <button class="modal-close" id="modal-close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <span class="modal-store" id="modal-store"></span>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-snippet" id="modal-snippet"></p>
        <p class="modal-price" id="modal-price"></p>
        <a class="modal-link" id="modal-link" href="#" target="_blank" rel="noopener noreferrer">
          View Deal
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
