<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Findly — Tech Deals in Bangladesh</title>
  <meta name="description" content="Search once, compare prices from 10+ BD tech stores. Phones, laptops, audio, accessories and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="top-nav">
    <div class="logo">Findly</div>
    <div class="logo-sub">a product of Giggly Gadgets</div>
  </header>

  <main class="container">

    <!-- Search bar -->
    <div class="search-section">
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search phones, laptops, earbuds..." autocomplete="off" spellcheck="false">
        <button class="filter-btn" aria-label="Filter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
          Filters
        </button>
      </div>
    </div>

    <!-- Filter panel -->
    <div id="filter-panel" class="filter-panel">
      <div class="filter-row">
        <div class="filter-group">
          <label for="filter-category">Category</label>
          <select id="filter-category"><option value="All">All categories</option></select>
        </div>
        <div class="filter-group">
          <label>Price range (৳)</label>
          <div class="price-range">
            <input type="number" id="filter-min" placeholder="Min" min="0">
            <span>—</span>
            <input type="number" id="filter-max" placeholder="Max" min="0">
          </div>
        </div>
        <div class="filter-group">
          <label for="filter-sort">Sort by</label>
          <select id="filter-sort">
            <option value="default">Relevance</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>
      </div>
      <div class="filter-actions">
        <button id="filter-clear">Clear filters</button>
      </div>
    </div>

    <!-- Results count -->
    <div class="results-info">
      <p id="result-summary">Loading...</p>
    </div>

    <!-- Product grid -->
    <div id="product-grid" class="product-grid"></div>

  </main>

  <!-- Product modal -->
  <div class="modal" id="product-modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-image-wrap">
        <img id="modal-img" src="" alt="">
        <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <span class="modal-store" id="modal-store"></span>
        <h2 class="modal-title" id="modal-title"></h2>
        <span class="modal-cat" id="modal-cat"></span>
        <p class="modal-price" id="modal-price"></p>
        <a class="modal-link" id="modal-link" href="#" target="_blank" rel="noopener noreferrer">
          View Deal
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="modal-overlay"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
